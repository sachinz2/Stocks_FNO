version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: falcon_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: falcon_db
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - falcon_network

  redis:
    image: redis:7-alpine
    container_name: falcon_redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - falcon_network

  api:
    build: .
    container_name: falcon_api
    depends_on:
      - mysql
      - redis
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    networks:
      - falcon_network
    volumes:
      - .:/app

  dashboard:
    build: .
    container_name: falcon_dashboard
    depends_on:
      - api
    env_file:
      - .env
    ports:
      - "8501:8501"
    command: streamlit run src/dashboard/app.py
    networks:
      - falcon_network
    volumes:
      - .:/app
  
  nginx:
    image: nginx:alpine
    container_name: falcon_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - dashboard
    networks:
      - falcon_network

networks:
  falcon_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  grafana_data:
  logs:
  backups: